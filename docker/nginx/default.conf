# BackOffice - port 80 (expose 8000)
server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
    root /var/www/html/backend/public;

    location /tinymce/ {
        alias /var/www/html/tinymce/;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}

# FrontOffice - port 8080 (expose 8080)
server {
    listen 8080;
    index index.php;
    server_name localhost;
    error_log  /var/log/nginx/fo_error.log;
    access_log /var/log/nginx/fo_access.log;
    root /var/www/html/frontend/public;

    # Compression Gzip
    gzip on;
    gzip_types text/css application/javascript text/javascript application/json image/svg+xml font/ttf application/font-woff2;
    gzip_min_length 256;

    # robots.txt servi directement
    location = /robots.txt {
        root /var/www/html/frontend/public;
        access_log off;
    }

    # Images redimensionnees en cache - servies depuis le disque, fallback vers PHP
    location ~ ^/img/cache/ {
        root /var/www/html/frontend/Views;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept";
        access_log off;
        try_files $uri @resize;
    }

    location @resize {
        fastcgi_pass app:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/frontend/public/resize.php;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Assets statiques (css, js, img, fonts) servis depuis Views/
    location ~ ^/(css|js|img|fonts)/ {
        root /var/www/html/frontend/Views;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Front controller - toutes les requêtes vers index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
